<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    body {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      background-color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    }

    .main {
      /* border: 2px solid white; */
      margin: 30px auto;
      padding: 22px;
      width: 50%;
      height: auto;
      text-align: center;
      background-color: #FFFFFF;
    }

    .inputs {
      border: 2px solid rgb(143, 140, 140);
      padding: 20px;
      margin: 10px auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 50%;
      text-align: center;
      flex-wrap: wrap;
      height: auto;
      background-color: #FFFFFF;
      border-radius: 8px;
    }

    .inputs input {
      padding: 8px;
      font-size: 20px;
      border-radius: 6px;

    }

    .inputs button {
      padding: 8px 12px;
      margin: 10px auto;
      width: 40%;
      font-size: 22px;
      border: none;
      border-radius: 6px;
      background-color: #7fa6fa;
      -moz-box-shadow: 0 0 10px #777777;
      -webkit-box-shadow: 0 0 10px #777777;
      box-shadow: 0 0 10px #777777;
    }

    .inputs button:hover {
      cursor: pointer;
    }

    span {
      color: blue;
    }

    span:hover {
      cursor: pointer;
    }
  </style>

</head>

<body>
  <div class="main">
    <div class="inputs">
      <h2>Register – Todo App
      </h2>
      <input type="email" name="Email" id="rgeinput" placeholder="Enter useremail" required>
      <input type="password" name="psd" id="rgpsd" placeholder="Enter password" required>
      <button id="rgbtn">Register</button>
    </div>
    <p>Already have an account?<span><a href="index.html">Log in</a>.</span></p>
  </div>
  <script src="register.js"></script>
</body>

</html>
