<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager Dashboard | Simple Todo App
  </title>
  <style>
    body {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #F8FAFC;
    }

    .main {
      /* border: 2px solid white; */
      display: flex;
      justify-content: space-around;
      gap: 30px;
      align-items: center;
      margin: 0px auto;
      padding: 22px;
      width: 90%;
      height: auto;
      text-align: center;
      background-color: #F8FAFC;
    }

    .leftmain {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .leftmain #logout {
      padding: 8px 10px;
      margin: 0;
      width: 10vw;
      font-size: 22px;
      align-self: center;
      border: none;
      border-radius: 6px;
      background-color: #7fa6fa;
      -moz-box-shadow: 0 0 10px #777777;
      -webkit-box-shadow: 0 0 10px #777777;
      box-shadow: 0 0 10px #777777;
    }

    .leftmain #logout:hover {
      cursor: pointer;
    }

    .sidebar {
      display: flex;
      border: 1px solid rgb(143, 140, 140);
      padding: 20px;
      margin: 10px auto;
      gap: 20px;
      width: 95%;
      text-align: center;
      flex-wrap: wrap;
      height: auto;
      border-radius: 8px;
      background-color: #FFFFFF;
    }

    .sidebar button {
      padding: 8px 10px;
      margin: 0;
      width: 10vw;
      font-size: 22px;
      border: none;
      border-radius: 6px;
      background-color: #7fa6fa;
      -moz-box-shadow: 0 0 10px #777777;
      -webkit-box-shadow: 0 0 10px #777777;
      box-shadow: 0 0 10px #777777;
    }

    .sidebar button:hover {
      cursor: pointer;

    }

    .inputs {
      border: 1px solid rgb(143, 140, 140);
      padding: 20px;
      margin: 10px auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 95%;
      text-align: center;
      flex-wrap: wrap;
      height: auto;
      background-color: #FFFFFF;
      border-radius: 8px;
    }

    .inputs input {
      padding: 8px;
      font-size: 20px;
      border-radius: 6px;

    }

    .inputs textarea {
      padding: 8px;
      font-size: 18px;
      border-radius: 6px;

    }

    .inputs button {
      padding: 8px 12px;
      margin: 10px auto;
      width: 40%;
      font-size: 22px;
      border: none;
      border-radius: 6px;
      background-color: #7fa6fa;
      -moz-box-shadow: 0 0 10px #777777;
      -webkit-box-shadow: 0 0 10px #777777;
      box-shadow: 0 0 10px #777777;
    }

    .inputs button:hover {
      cursor: pointer;
    }

    .tsk {
      border: 1px solid rgb(143, 140, 140);
      padding: 20px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 50%;
      text-align: center;
      flex-wrap: wrap;
      background-color: #FFFFFF;
      border-radius: 8px;
    }

    .tsk h3 {
      margin: 0 auto;
      font-size: 24px;
      font-weight: 700;
    }

    .tasks {
      overflow-y: auto;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      text-align: justify;
      height: 70vh;
      padding: 2px;
    }

    .task-style {
      background-color: #f4f4f4;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      word-wrap: break-word;
      text-align: justify;
      border: 1px solid rgb(143, 140, 140);
      scroll-behavior: smooth;
    }

    .task-style button {
      padding: 4px;
      font-size: 18px;
      border-radius: 8px;
      background-color: #7fa6fa;
      border: none;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      /* space between checkbox and button */
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="main">
    <div class="leftmain">
      <div class="sidebar">

        <button id="completed">Completed</button>
        <button id="pending">Pending</button>
        <button id="alltasks">All</button>
      </div>
      <div class="inputs">
        <h2>Add New Task</h2>
        <input type="text" name="tskname" placeholder="Task Title" id="tasktitle" required>
        <textarea name="description" id="taskdescription" placeholder="Task Description" required></textarea>
        <button class="taskButton" onclick="addTasks()"> + Add Task</button>
      </div>
      <button id="logout">Logout</button>
    </div>
    <div class="tsk" id="tskmainarea">
      <h3>Your Tasks</h3>
      <div class="tasks" id="tasksarea">

      </div>
    </div>
  </div>


  <script src="dashboard.js"></script>
</body>

</html>
